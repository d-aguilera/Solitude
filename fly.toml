# fly.toml app configuration file generated for solitude on 2026-05-28T02:08:37Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solitude'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DIST_DIR = 'dist'
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
