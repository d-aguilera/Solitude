# fly.toml app configuration file generated for solitude on 2026-06-30T15:28:55Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'solitude'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = false
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
