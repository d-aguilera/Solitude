<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solitude Server Probe</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #111615;
        color: #eef3ef;
      }
      body {
        margin: 0;
      }
      main {
        display: grid;
        gap: 18px;
        margin: 0 auto;
        max-width: 980px;
        padding: 28px;
      }
      h1 {
        font-size: 24px;
        font-weight: 650;
        margin: 0;
      }
      section {
        border: 1px solid #2c3936;
        border-radius: 8px;
        padding: 16px;
      }
      .viewer {
        display: grid;
        gap: 10px;
        padding: 0;
      }
      canvas {
        aspect-ratio: 16 / 9;
        background: #030504;
        border-radius: 8px;
        display: block;
        width: 100%;
      }
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      }
      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #b8c6bf;
      }
      input {
        background: #0a0d0c;
        border: 1px solid #354540;
        border-radius: 6px;
        color: #eef3ef;
        font: inherit;
        padding: 9px 10px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button {
        background: #d7f3de;
        border: 0;
        border-radius: 6px;
        color: #0b120d;
        cursor: pointer;
        font: inherit;
        font-weight: 650;
        min-height: 40px;
        padding: 9px 13px;
      }
      button.secondary {
        background: #263430;
        color: #eef3ef;
      }
      pre {
        background: #080b0a;
        border-radius: 8px;
        color: #d7e6dc;
        margin: 0;
        min-height: 260px;
        overflow: auto;
        padding: 14px;
        white-space: pre-wrap;
      }
      .status {
        color: #a9bab2;
        font-variant-numeric: tabular-nums;
      }
      .run-state {
        color: #d7f3de;
      }
      .key-state {
        color: #d7e6dc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Solitude Server Probe</h1>
      <section class="grid">
        <label>Client <input id="clientId" value="client:a" /></label>
        <label>Game <input id="gameId" placeholder="game:1" /></label>
        <label>Entity <input id="entityId" placeholder="ship:blue" /></label>
        <label
          >Step millis <input id="dtMillis" type="number" value="1000"
        /></label>
        <label
          >Run interval <input id="runIntervalMillis" type="number" value="250"
        /></label>
      </section>
      <section class="actions">
        <button id="createGame">Create game</button>
        <button id="joinGame" class="secondary">Join game</button>
        <button id="connectEvents" class="secondary">Reconnect stream</button>
        <button id="toggleBurn" class="secondary">Start forward burn</button>
        <button id="stepGame">Step</button>
        <button id="toggleRun" class="secondary">Run</button>
      </section>
      <section>
        <div id="status" class="status">Snapshot stream waiting for a game</div>
        <div id="runStatus" class="status run-state">Paused</div>
        <div id="keyStatus" class="status key-state">
          Keyboard controls idle
        </div>
      </section>
      <section class="viewer">
        <canvas id="snapshotCanvas" width="960" height="540"></canvas>
        <div id="snapshotStatus" class="status">No snapshot rendered</div>
      </section>
      <pre id="log"></pre>
    </main>
    <script>
      let sequence = 1;
      let burnHeld = false;
      let events = null;
      let runTimer = 0;
      const heldControls = {};
      const keyMap = {
        Digit0: "thrust0",
        Digit1: "thrust1",
        Digit2: "thrust2",
        Digit3: "thrust3",
        Digit4: "thrust4",
        Digit5: "thrust5",
        Digit6: "thrust6",
        Digit7: "thrust7",
        Digit8: "thrust8",
        Digit9: "thrust9",
        KeyA: "yawLeft",
        KeyB: "burnBackwards",
        KeyD: "yawRight",
        KeyE: "rollRight",
        KeyM: "burnRight",
        KeyN: "burnLeft",
        KeyQ: "rollLeft",
        KeyS: "pitchDown",
        KeyW: "pitchUp",
        Space: "burnForward",
      };

      const fields = {
        clientId: document.querySelector("#clientId"),
        gameId: document.querySelector("#gameId"),
        entityId: document.querySelector("#entityId"),
        dtMillis: document.querySelector("#dtMillis"),
        runIntervalMillis: document.querySelector("#runIntervalMillis"),
      };
      const logEl = document.querySelector("#log");
      const keyStatusEl = document.querySelector("#keyStatus");
      const snapshotCanvas = document.querySelector("#snapshotCanvas");
      const snapshotContext = snapshotCanvas.getContext("2d");
      const snapshotStatusEl = document.querySelector("#snapshotStatus");
      const statusEl = document.querySelector("#status");
      const runStatusEl = document.querySelector("#runStatus");
      const toggleBurnButton = document.querySelector("#toggleBurn");
      const toggleRunButton = document.querySelector("#toggleRun");

      document.querySelector("#createGame").addEventListener("click", () => {
        sendMessage({
          type: "createGame",
          clientId: fields.clientId.value,
          sequence: nextSequence(),
        });
      });
      document.querySelector("#joinGame").addEventListener("click", () => {
        sendMessage({
          type: "joinGame",
          clientId: fields.clientId.value,
          gameId: fields.gameId.value,
          sequence: nextSequence(),
        });
      });
      document
        .querySelector("#connectEvents")
        .addEventListener("click", connectEvents);
      toggleBurnButton.addEventListener("click", toggleForwardBurn);
      document.querySelector("#stepGame").addEventListener("click", stepGame);
      toggleRunButton.addEventListener("click", toggleRun);
      window.addEventListener("keydown", (event) => {
        void handleKeyboardInput(event, true);
      });
      window.addEventListener("keyup", (event) => {
        void handleKeyboardInput(event, false);
      });

      async function sendMessage(message) {
        const response = await fetch("/message", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(message),
        });
        const payload = await response.json();
        handleMessages(payload.messages, { connectAfterJoin: true });
      }

      async function stepGame() {
        if (!fields.gameId.value) {
          statusEl.textContent = "Create or join a game before stepping";
          return;
        }
        const response = await fetch("/step", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            gameId: fields.gameId.value,
            dtMillis: Number(fields.dtMillis.value),
          }),
        });
        const payload = await response.json();
        handleMessages(payload.messages, {
          suppressSnapshots: Boolean(events),
        });
      }

      async function handleKeyboardInput(event, isDown) {
        if (event.repeat || event.target instanceof HTMLInputElement) return;
        const action = keyMap[event.code];
        if (!action) return;
        event.preventDefault();
        if (!fields.gameId.value || !fields.entityId.value) {
          keyStatusEl.textContent =
            "Keyboard controls waiting for assigned entity";
          return;
        }
        if (heldControls[action] === isDown) return;
        heldControls[action] = isDown;
        keyStatusEl.textContent = action + " " + (isDown ? "held" : "released");
        await sendMessage({
          type: "input",
          clientId: fields.clientId.value,
          entityId: fields.entityId.value,
          gameId: fields.gameId.value,
          sequence: nextSequence(),
          controls: { [action]: isDown },
        });
      }

      function toggleForwardBurn() {
        if (!fields.gameId.value || !fields.entityId.value) {
          statusEl.textContent = "Create or join a game before sending input";
          return;
        }
        burnHeld = !burnHeld;
        heldControls.burnForward = burnHeld;
        if (burnHeld) heldControls.thrust5 = true;
        toggleBurnButton.textContent = burnHeld
          ? "Stop forward burn"
          : "Start forward burn";
        statusEl.textContent = burnHeld
          ? "Forward burn held"
          : "Forward burn released";
        sendMessage({
          type: "input",
          clientId: fields.clientId.value,
          entityId: fields.entityId.value,
          gameId: fields.gameId.value,
          sequence: nextSequence(),
          controls: burnHeld
            ? { burnForward: true, thrust5: true }
            : { burnForward: false },
        });
      }

      function toggleRun() {
        if (runTimer) {
          stopRunLoop();
          return;
        }
        if (!fields.gameId.value) {
          statusEl.textContent = "Create or join a game before running";
          return;
        }
        const intervalMillis = Math.max(
          50,
          Number(fields.runIntervalMillis.value) || 250,
        );
        fields.runIntervalMillis.value = String(intervalMillis);
        runStatusEl.textContent = "Running every " + intervalMillis + " ms";
        toggleRunButton.textContent = "Pause";
        runTimer = window.setInterval(() => {
          void stepGame();
        }, intervalMillis);
        void stepGame();
      }

      function stopRunLoop() {
        window.clearInterval(runTimer);
        runTimer = 0;
        runStatusEl.textContent = "Paused";
        toggleRunButton.textContent = "Run";
      }

      function connectEvents() {
        if (!fields.gameId.value) {
          statusEl.textContent =
            "Create or join a game before connecting the snapshot stream";
          return;
        }
        if (events) events.close();
        events = new EventSource(
          "/events?gameId=" + encodeURIComponent(fields.gameId.value),
        );
        events.addEventListener("ready", (event) => {
          statusEl.textContent =
            "Snapshot stream connected for " + JSON.parse(event.data).gameId;
        });
        events.onmessage = (event) => {
          handleMessages([JSON.parse(event.data)]);
        };
        events.onerror = () => {
          statusEl.textContent = "SSE reconnecting";
        };
      }

      function handleMessages(messages, options = {}) {
        for (const message of messages) {
          if (message.type === "gameCreated") {
            fields.gameId.value = message.gameId;
          }
          if (message.type === "joined") {
            fields.gameId.value = message.gameId;
            fields.entityId.value = message.entityId;
            if (options.connectAfterJoin) connectEvents();
          }
          if (message.type === "snapshot") {
            renderSnapshot(message);
            if (options.suppressSnapshots) continue;
            statusEl.textContent =
              "tick " +
              message.tick +
              " | entities " +
              message.snapshot.entities.length;
          }
          log(message);
        }
      }

      function renderSnapshot(message) {
        if (!snapshotContext) return;
        const entities = message.snapshot.entities.filter((entity) =>
          isFiniteVec3(entity.position),
        );
        const width = snapshotCanvas.width;
        const height = snapshotCanvas.height;
        snapshotContext.clearRect(0, 0, width, height);
        snapshotContext.fillStyle = "#030504";
        snapshotContext.fillRect(0, 0, width, height);

        const focus =
          entities.find((entity) => entity.id === fields.entityId.value) ??
          entities[0];
        const focusPosition = focus?.position ?? { x: 0, y: 0, z: 0 };
        const scale = Math.min(width, height) * 0.055;
        const centerX = width * 0.5;
        const centerY = height * 0.5;

        drawGrid(snapshotContext, width, height);
        for (const entity of entities) {
          const projected = projectPosition(
            entity.position,
            focusPosition,
            centerX,
            centerY,
            scale,
          );
          if (!projected.visible) continue;
          drawEntity(snapshotContext, entity, projected.x, projected.y);
        }

        const speed = focus
          ? vectorMagnitude(focus.velocity).toFixed(1)
          : "0.0";
        snapshotStatusEl.textContent =
          "rendered tick " +
          message.tick +
          " | focus " +
          (focus?.id ?? "none") +
          " | speed " +
          speed +
          " m/s";
      }

      function drawGrid(context, width, height) {
        context.strokeStyle = "#16211d";
        context.lineWidth = 1;
        for (let x = width % 80; x < width; x += 80) {
          context.beginPath();
          context.moveTo(x, 0);
          context.lineTo(x, height);
          context.stroke();
        }
        for (let y = height % 80; y < height; y += 80) {
          context.beginPath();
          context.moveTo(0, y);
          context.lineTo(width, y);
          context.stroke();
        }
      }

      function projectPosition(
        position,
        focusPosition,
        centerX,
        centerY,
        scale,
      ) {
        const dx = position.x - focusPosition.x;
        const dy = position.y - focusPosition.y;
        const x = centerX + signedLog(dx, 1_000_000) * scale;
        const y = centerY - signedLog(dy, 1_000_000) * scale;
        return {
          visible:
            x >= -40 &&
            x <= snapshotCanvas.width + 40 &&
            y >= -40 &&
            y <= snapshotCanvas.height + 40,
          x,
          y,
        };
      }

      function signedLog(value, divisor) {
        return Math.sign(value) * Math.log1p(Math.abs(value) / divisor);
      }

      function drawEntity(context, entity, x, y) {
        const isShip = entity.id.startsWith("ship:");
        const radius = entity.id === fields.entityId.value ? 6 : isShip ? 5 : 4;
        context.fillStyle = colorForEntity(entity.id);
        context.beginPath();
        context.arc(x, y, radius, 0, Math.PI * 2);
        context.fill();
        if (isShip || entity.id === fields.entityId.value) {
          context.fillStyle = "#d7e6dc";
          context.font = "12px ui-sans-serif, system-ui";
          context.fillText(entity.id, x + 8, y - 8);
        }
      }

      function colorForEntity(entityId) {
        if (entityId.includes("sun")) return "#ffd166";
        if (entityId.includes("earth")) return "#5eb1ff";
        if (entityId.includes("moon")) return "#c7cbd1";
        if (entityId === "ship:blue") return "#7db7ff";
        if (entityId === "ship:red") return "#ff6b6b";
        return "#d7f3de";
      }

      function vectorMagnitude(vector) {
        if (!vector) return 0;
        return Math.hypot(vector.x ?? 0, vector.y ?? 0, vector.z ?? 0);
      }

      function isFiniteVec3(value) {
        return (
          value &&
          Number.isFinite(value.x) &&
          Number.isFinite(value.y) &&
          Number.isFinite(value.z)
        );
      }

      function nextSequence() {
        const value = sequence;
        sequence += 1;
        return value;
      }

      function log(value) {
        const loggedValue =
          value.type === "snapshot"
            ? {
                type: value.type,
                gameId: value.gameId,
                sequence: value.sequence,
                tick: value.tick,
                entities: value.snapshot.entities.length,
              }
            : value;
        logEl.textContent =
          JSON.stringify(loggedValue, null, 2) +
          "\n\n" +
          logEl.textContent.slice(0, 10000);
      }
    </script>
  </body>
</html>
