<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solitude Remote Client</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/game.css" />
  </head>
  <body>
    <main class="play">
      <input id="clientId" type="hidden" value="client:a" />
      <input id="gameId" type="hidden" />
      <input id="entityId" type="hidden" />
      <header class="game-header">
        <div>
          <h1>Solitude</h1>
          <div class="game-meta">
            <span id="gameLabel">Game waiting</span>
            <span id="entityLabel">Entity waiting</span>
          </div>
        </div>
        <a id="lobbyLink" class="button secondary" href="/">Lobby</a>
      </header>
      <section class="viewer">
        <canvas id="snapshotCanvas" width="960" height="540"></canvas>
        <pre id="hud" class="hud">HUD waiting</pre>
        <div class="viewer-status">
          <span id="status" class="status">Choose a game</span>
          <span id="runStatus" class="status run-state">Waiting</span>
          <span id="keyStatus" class="status key-state">Keyboard idle</span>
          <span id="snapshotStatus" class="status">No snapshot rendered</span>
        </div>
      </section>
    </main>
    <script type="module" src="/src/remoteClient.ts"></script>
  </body>
</html>
